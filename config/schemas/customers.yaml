name: customers
file_pattern: "customers*.csv"
columns:
  - name: customer_id
    type: integer
    required: true
    unique: true
    min: 1
  - name: email
    type: string
    required: true
    format: email
  - name: name
    type: string
    required: true
    min_length: 1
    max_length: 200
  - name: signup_date
    type: date
    required: true
    format: "YYYY-MM-DD"
    min: "2020-01-01"
    max: "2030-12-31"
  - name: tier
    type: string
    required: false
    allowed_values: ["free", "basic", "premium", "enterprise"]
  - name: lifetime_value
    type: float
    required: false
    min: 0
    max: 1000000
